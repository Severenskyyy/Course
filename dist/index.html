Процедура ОтменитьБронирование(Книга, Читатель)
    Запрос = Новый Запрос;
    Запрос.Текст = 
        "ВЫБРАТЬ
        |   Бронирования.Ссылка КАК Бронирование
        |ИЗ
        |   Справочник.Бронирования КАК Бронирования
        |ГДЕ
        |   Бронирования.Книга = &Книга
        |   И Бронирования.Читатель = &Читатель
        |   И Бронирования.Активно = ИСТИНА";
    
    Запрос.УстановитьПараметр("Книга", Книга);
    Запрос.УстановитьПараметр("Читатель", Читатель);
    
    Выборка = Запрос.Выполнить().Выбрать();
    Пока Выборка.Следующий() Цикл
        БроньОбъект = Выборка.Бронирование.ПолучитьОбъект();
        БроньОбъект.Активно = Ложь;
        БроньОбъект.Записать();
    КонецЦикла;
КонецПроцедуры

// Реквизиты документа:
// - Читатель - СправочникСсылка.Читатели
// - Книга - СправочникСсылка.Книги  
// - ДатаВыдачи - Дата
// - СрокВозврата - Дата
// - Библиотекарь - СправочникСсылка.Пользователи`,returnDocument:`// ========================================
// ДОКУМЕНТ "Возврат книги"
// Конфигурация 1С:Предприятие 8.3
// ========================================

// Модуль объекта документа "ВозвратКниги"
Процедура ОбработкаПроведения(Отказ, РежимПроведения)
    // Поиск активной выдачи
    Запрос = Новый Запрос;
    Запрос.Текст = 
        "ВЫБРАТЬ
        |   Выдачи.НомерВыдачи КАК НомерВыдачи,
        |   Выдачи.СрокВозврата КАК СрокВозврата,
        |   Выдачи.КоличествоОстаток КАК Остаток
        |ИЗ
        |   РегистрНакопления.Выдачи.Остатки КАК Выдачи
        |ГДЕ
        |   Выдачи.Книга = &Книга
        |   И Выдачи.Читатель = &Читатель
        |   И Выдачи.КоличествоОстаток > 0";
    
    Запрос.УстановитьПараметр("Книга", Книга);
    Запрос.УстановитьПараметр("Читатель", Читатель);
    
    Результат = Запрос.Выполнить();
    
    Если Результат.Пустой() Тогда
        Сообщить("Активная выдача книги """ + Книга + """ 
                 |читателю """ + Читатель + """ не найдена!",
                 СтатусСообщения.Важное);
        Отказ = Истина;
        Возврат;
    КонецЕсли;
    
    Выборка = Результат.Выбрать();
    Выборка.Следующий();
    
    // Расчёт просрочки
    ДнейПросрочки = 0;
    ЕстьПросрочка = Ложь;
    
    Если ДатаВозврата > Выборка.СрокВозврата Тогда
        ЕстьПросрочка = Истина;
        ДнейПросрочки = (ДатаВозврата - Выборка.СрокВозврата) / 86400;
        
        // Логируем просрочку для отчётности
        ЗаписатьПросрочку(Книга, Читатель, ДнейПросрочки, Выборка.НомерВыдачи);
    КонецЕсли;
    
    // Движение по регистру - списание
    Движения.Выдачи.Записывать = Истина;
    Движение = Движения.Выдачи.Добавить();
    Движение.ВидДвижения = ВидДвиженияНакопления.Расход;
    Движение.Период = Дата;
    Движение.Читатель = Читатель;
    Движение.Книга = Книга;
    Движение.НомерВыдачи = Выборка.НомерВыдачи;
    Движение.Количество = 1;
    
    // Обновляем доступность книги
    КнигаОбъект = Книга.ПолучитьОбъект();
    КнигаОбъект.Доступна = Истина;
    КнигаОбъект.Записать();
    
    // Записываем информацию в документ выдачи
    ВыдачаОбъект = Выборка.НомерВыдачи.ПолучитьОбъект();
    ВыдачаОбъект.ДатаВозврата = ДатаВозврата;
    ВыдачаОбъект.ВернулБиблиотекарь = ТекущийПользователь();
    ВыдачаОбъект.Записать();
КонецПроцедуры

Процедура ЗаписатьПросрочку(Книга, Читатель, ДнейПросрочки, НомерВыдачи)
    // Запись в регистр сведений "Просрочки" для отчётности
    НаборЗаписей = РегистрыСведений.Просрочки.СоздатьНаборЗаписей();
    НаборЗаписей.Отбор.Выдача.Установить(НомерВыдачи);
    
    Запись = НаборЗаписей.Добавить();
    Запись.Период = ТекущаяДата();
    Запись.Выдача = НомерВыдачи;
    Запись.Книга = Книга;
    Запись.Читатель = Читатель;
    Запись.ДнейПросрочки = ДнейПросрочки;
    
    НаборЗаписей.Записать();
КонецПроцедуры`,register:`// ========================================
// РЕГИСТР НАКОПЛЕНИЯ "Выдачи"
// Конфигурация 1С:Предприятие 8.3
// ========================================

// Структура регистра накопления "Выдачи"
// Вид регистра: Остатки
//
// Измерения:
// - Книга - СправочникСсылка.Книги
// - Читатель - СправочникСсылка.Читатели
// - НомерВыдачи - ДокументСсылка.ВыдачаКниги
//
// Ресурсы:
// - Количество - Число(1)
//
// Реквизиты:
// - ДатаВыдачи - Дата
// - СрокВозврата - Дата

// ========================================
// Запрос для получения текущих просрочек
// ========================================
Функция ПолучитьТекущиеПросрочки() Экспорт
    Запрос = Новый Запрос;
    Запрос.Текст = 
        "ВЫБРАТЬ
        |   Выдачи.Читатель.Код КАК ИдЧитателя,
        |   Выдачи.Читатель.ФИО КАК ФИО,
        |   Выдачи.Читатель.Группа.Наименование КАК Группа,
        |   Выдачи.Книга.Код КАК КодКниги,
        |   Выдачи.Книга.Наименование КАК НазваниеКниги,
        |   Выдачи.Книга.Автор КАК Автор,
        |   Выдачи.ДатаВыдачи КАК ДатаВыдачи,
        |   Выдачи.СрокВозврата КАК СрокВозврата,
        |   РАЗНОСТЬДАТ(Выдачи.СрокВозврата, &ТекущаяДата, ДЕНЬ) КАК ДнейПросрочки
        |ИЗ
        |   РегистрНакопления.Выдачи.Остатки КАК Выдачи
        |ГДЕ
        |   Выдачи.КоличествоОстаток > 0
        |   И Выдачи.СрокВозврата < &ТекущаяДата
        |УПОРЯДОЧИТЬ ПО
        |   ДнейПросрочки УБЫВ";
    
    Запрос.УстановитьПараметр("ТекущаяДата", НачалоДня(ТекущаяДата()));
    
    Возврат Запрос.Выполнить().Выгрузить();
КонецФункции

// Запрос для расчёта KPI
Функция РассчитатьKPIПросрочек() Экспорт
    Запрос = Новый Запрос;
    Запрос.Текст = 
        "ВЫБРАТЬ
        |   СУММА(ВЫБОР КОГДА Выдачи.СрокВозврата < &ТекущаяДата 
        |               ТОГДА 1 ИНАЧЕ 0 КОНЕЦ) КАК ВсегоПросрочек,
        |   СУММА(1) КАК ВсегоАктивных,
        |   СРЕДНЕЕ(ВЫБОР КОГДА Выдачи.СрокВозврата < &ТекущаяДата 
        |                 ТОГДА РАЗНОСТЬДАТ(Выдачи.СрокВозврата, &ТекущаяДата, ДЕНЬ)
        |                 ИНАЧЕ 0 КОНЕЦ) КАК СредняяПросрочка
        |ИЗ
        |   РегистрНакопления.Выдачи.Остатки КАК Выдачи
        |ГДЕ
        |   Выдачи.КоличествоОстаток > 0";
    
    Запрос.УстановитьПараметр("ТекущаяДата", НачалоДня(ТекущаяДата()));
    
    Выборка = Запрос.Выполнить().Выбрать();
    Выборка.Следующий();
    
    Результат = Новый Структура;
    Результат.Вставить("ВсегоПросрочек", Выборка.ВсегоПросрочек);
    Результат.Вставить("ВсегоАктивных", Выборка.ВсегоАктивных);
    Результат.Вставить("СредняяПросрочка", Выборка.СредняяПросрочка);
    
    Если Выборка.ВсегоАктивных > 0 Тогда
        ПроцентПросрочек = Выборка.ВсегоПросрочек / Выборка.ВсегоАктивных * 100;
        Результат.Вставить("ПроцентПросрочек", ПроцентПросрочек);
        Результат.Вставить("ВНорме", ПроцентПросрочек <= 15); // KPI: ≤15%
    Иначе
        Результат.Вставить("ПроцентПросрочек", 0);
        Результат.Вставить("ВНорме", Истина);
    КонецЕсли;
    
    Возврат Результат;
КонецФункции`,report:`// ========================================
// ОТЧЁТ "Просрочки"
// Конфигурация 1С:Предприятие 8.3
// Система компоновки данных (СКД)
// ========================================

// Основной запрос СКД для отчёта "Просрочки"
ВЫБРАТЬ
    Выдачи.Читатель.Код КАК reader_id,
    Выдачи.Читатель.ФИО КАК fio,
    Выдачи.Читатель.Группа.Наименование КАК group,
    Выдачи.Книга.Код КАК book_code,
    Выдачи.Книга.Наименование КАК title,
    Выдачи.Книга.Автор КАК author,
    Выдачи.Книга.УДК КАК udk,
    Выдачи.ДатаВыдачи КАК issue_date,
    Выдачи.СрокВозврата КАК due_date,
    РАЗНОСТЬДАТ(Выдачи.СрокВозврата, &ТекущаяДата, ДЕНЬ) КАК days_overdue
ИЗ
    РегистрНакопления.Выдачи.Остатки КАК Выдачи
ГДЕ
    Выдачи.КоличествоОстаток > 0
    И Выдачи.СрокВозврата < &ТекущаяДата
    {И Выдачи.Читатель.Группа = &Группа}
    {И Выдачи.Книга.Автор = &Автор}
    {И Выдачи.Книга.УДК ПОДОБНО &УДК}
    {И РАЗНОСТЬДАТ(Выдачи.СрокВозврата, &ТекущаяДата, ДЕНЬ) >= &МинДней}
    {И РАЗНОСТЬДАТ(Выдачи.СрокВозврата, &ТекущаяДата, ДЕНЬ) <= &МаксДней}
УПОРЯДОЧИТЬ ПО
    days_overdue УБЫВ

// ----------------------------------------
// Параметры отчёта (СКД):
// ----------------------------------------
// ТекущаяДата - Дата - НачалоДня(ТекущаяДата())
// Группа - СправочникСсылка.ГруппыЧитателей (необязательный)
// Автор - Строка (необязательный)  
// УДК - Строка (необязательный, использует ПОДОБНО)
// МинДней - Число (необязательный)
// МаксДней - Число (необязательный)

// ----------------------------------------
// Ресурсы отчёта:
// ----------------------------------------
// - ПроцентПросрочек = ВыражениеПредставления("days_overdue > 0")
// - СредняяПросрочка = Среднее(days_overdue)
// - МедианнаяПросрочка = Медиана(days_overdue)

// ----------------------------------------
// Группировки:
// ----------------------------------------
// - По группе читателя
// - По автору книги
// - По интервалу просрочки (1-3, 4-7, 8-14, 15+ дней)

// ========================================
// Модуль отчёта: Формирование показателей KPI
// ========================================
Процедура ПриКомпоновкеРезультата(ДокументРезультат, ДанныеРасшифровки, 
                                   СтандартнаяОбработка)
    
    // Получаем KPI
    KPI = РегистрыНакопления.Выдачи.РассчитатьKPIПросрочек();
    
    // Добавляем блок KPI в шапку отчёта
    Макет = ПолучитьМакет("МакетKPI");
    ОбластьKPI = Макет.ПолучитьОбласть("KPI");
    
    ОбластьKPI.Параметры.ВсегоПросрочек = KPI.ВсегоПросрочек;
    ОбластьKPI.Параметры.ВсегоАктивных = KPI.ВсегоАктивных;
    ОбластьKPI.Параметры.ПроцентПросрочек = Формат(KPI.ПроцентПросрочек, "ЧЦ=5; ЧДЦ=2") + "%";
    ОбластьKPI.Параметры.СредняяПросрочка = Формат(KPI.СредняяПросрочка, "ЧЦ=5; ЧДЦ=1") + " дн.";
    ОбластьKPI.Параметры.ЦелевойПорог = "≤ 15%";
    ОбластьKPI.Параметры.Статус = ?(KPI.ВНорме, "✓ В норме", "✗ Превышен");
    ОбластьKPI.Параметры.ЦветСтатуса = ?(KPI.ВНорме, 
        Новый Цвет(46, 204, 113),   // Зелёный
        Новый Цвет(231, 76, 60));   // Красный
    
    ДокументРезультат.Вывести(ОбластьKPI);
КонецПроцедуры`,importExport:`// ========================================
// ОБРАБОТКА "Импорт/Экспорт CSV"
// Интеграция с внешними системами (FastAPI backend)
// Конфигурация 1С:Предприятие 8.3
// ========================================

// ----------------------------------------
// ИМПОРТ КНИГ ИЗ CSV
// Идемпотентный импорт: обновление существующих записей
// ----------------------------------------
Процедура ИмпортКнигИзCSV(ПутьКФайлу) Экспорт
    Текст = Новый ЧтениеТекста(ПутьКФайлу, КодировкаТекста.UTF8);
    
    // Пропускаем заголовок
    Текст.ПрочитатьСтроку();
    
    Импортировано = 0;
    Обновлено = 0;
    Ошибок = 0;
    
    Пока Истина Цикл
        Строка = Текст.ПрочитатьСтроку();
        Если Строка = Неопределено Тогда
            Прервать;
        КонецЕсли;
        
        Попытка
            // Парсинг CSV (разделитель ";")
            Поля = СтрРазделить(Строка, ";");
            
            КодКниги = СокрЛП(Поля[0]);
            Наименование = СокрЛП(Поля[1]);
            Автор = СокрЛП(Поля[2]);
            ГодИздания = Число(Поля[3]);
            УДК = СокрЛП(Поля[4]);
            Описание = ?(Поля.Количество() > 5, СокрЛП(Поля[5]), "");
            Издательство = ?(Поля.Количество() > 6, СокрЛП(Поля[6]), "");
            Страниц = ?(Поля.Количество() > 7 И ЗначениеЗаполнено(Поля[7]), 
                        Число(Поля[7]), 0);
            ISBN = ?(Поля.Количество() > 8, СокрЛП(Поля[8]), "");
            
            // Поиск существующей книги (идемпотентность)
            КнигаСсылка = Справочники.Книги.НайтиПоКоду(КодКниги);
            
            Если КнигаСсылка.Пустая() Тогда
                // Создание новой книги
                КнигаОбъект = Справочники.Книги.СоздатьЭлемент();
                КнигаОбъект.Код = КодКниги;
                КнигаОбъект.Доступна = Истина;
                Импортировано = Импортировано + 1;
            Иначе
                // Обновление существующей
                КнигаОбъект = КнигаСсылка.ПолучитьОбъект();
                Обновлено = Обновлено + 1;
            КонецЕсли;
            
            КнигаОбъект.Наименование = Наименование;
            КнигаОбъект.Автор = Автор;
            КнигаОбъект.ГодИздания = ГодИздания;
            КнигаОбъект.УДК = УДК;
            КнигаОбъект.Описание = Описание;
            КнигаОбъект.Издательство = Издательство;
            КнигаОбъект.КоличествоСтраниц = Страниц;
            КнигаОбъект.ISBN = ISBN;
            
            КнигаОбъект.Записать();
            
        Исключение
            Ошибок = Ошибок + 1;
            ЗаписьЖурналаРегистрации("ИмпортКниг", 
                УровеньЖурналаРегистрации.Предупреждение,,,
                "Ошибка импорта строки: " + ОписаниеОшибки());
        КонецПопытки;
    КонецЦикла;
    
    Текст.Закрыть();
    
    // Журнал аудита
    ЗаписьЖурналаРегистрации("ИмпортКниг", 
        УровеньЖурналаРегистрации.Информация,,,
        "Импорт завершён. Создано: " + Импортировано + 
        ", Обновлено: " + Обновлено + ", Ошибок: " + Ошибок);
    
    Сообщить("Импорт завершён. Создано: " + Импортировано + 
             ", Обновлено: " + Обновлено + ", Ошибок: " + Ошибок);
КонецПроцедуры

// ----------------------------------------
// ЭКСПОРТ ОТЧЁТА О ПРОСРОЧКАХ В CSV
// Формат согласно ТЗ: reader_id;fio;book_code;title;days_overdue
// ----------------------------------------
Процедура ЭкспортПросрочекВCSV(ПутьКФайлу) Экспорт
    ТаблицаПросрочек = РегистрыНакопления.Выдачи.ПолучитьТекущиеПросрочки();
    
    Текст = Новый ЗаписьТекста(ПутьКФайлу, КодировкаТекста.UTF8);
    
    // Заголовок CSV согласно ТЗ
    Текст.ЗаписатьСтроку("reader_id;fio;group;book_code;title;author;issue_date;due_date;days_overdue");
    
    Для Каждого Строка Из ТаблицаПросрочек Цикл
        ДанныеСтроки = СтрШаблон("%1;%2;%3;%4;%5;%6;%7;%8;%9",
            Строка.ИдЧитателя,
            Строка.ФИО,
            Строка.Группа,
            Строка.КодКниги,
            Строка.НазваниеКниги,
            Строка.Автор,
            Формат(Строка.ДатаВыдачи, "ДФ=yyyy-MM-dd"),
            Формат(Строка.СрокВозврата, "ДФ=yyyy-MM-dd"),
            Строка.ДнейПросрочки
        );
        Текст.ЗаписатьСтроку(ДанныеСтроки);
    КонецЦикла;
    
    // Добавляем итоги
    KPI = РегистрыНакопления.Выдачи.РассчитатьKPIПросрочек();
    Текст.ЗаписатьСтроку("");
    Текст.ЗаписатьСтроку("Итого просрочек;" + KPI.ВсегоПросрочек);
    Текст.ЗаписатьСтроку("Всего активных выдач;" + KPI.ВсегоАктивных);
    Текст.ЗаписатьСтроку("Процент просрочек;" + 
        Формат(KPI.ПроцентПросрочек, "ЧЦ=5; ЧДЦ=2") + "%");
    Текст.ЗаписатьСтроку("Средняя просрочка;" + 
        Формат(KPI.СредняяПросрочка, "ЧЦ=5; ЧДЦ=1") + " дн.");
    Текст.ЗаписатьСтроку("Целевой порог KPI;≤ 15%");
